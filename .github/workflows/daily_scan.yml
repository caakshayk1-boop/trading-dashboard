name: SwingDesk Pro — Auto Scan

# IST = UTC+5:30
# 09:20 IST = 03:50 UTC  → pre-market: 4H early + commodities
# 11:45 IST = 06:15 UTC  → mid-session: swing + F&O + 4H
# 16:30 IST = 11:00 UTC  → EOD: breakouts (daily closed) + commodities
# 09:30 IST SAT = 04:00 UTC  → full routine + multibaggers
on:
  schedule:
    - cron: '50 3 * * 1-5'    # 09:20 IST — morning pre-market (Mon-Fri)
    - cron: '15 6 * * 1-5'    # 11:45 IST — mid-session (Mon-Fri)
    - cron: '0 11 * * 1-5'    # 16:30 IST — EOD (Mon-Fri, candles confirmed)
    - cron: '0 4 * * 6'       # 09:30 IST — Saturday full scan + multibaggers
  workflow_dispatch:           # manual trigger from GitHub UI

env:
  TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
  UPSTOX_API_KEY:    ${{ secrets.UPSTOX_API_KEY }}
  UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python standalone_scan.py

      - name: Commit signal data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: update signals $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
