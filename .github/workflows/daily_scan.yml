name: SwingDesk Pro — Auto Scan

on:
  schedule:
    # 9:25 AM IST = 03:55 UTC — morning open scan
    - cron: '55 3 * * 1-5'
    # 2:00 PM IST = 08:30 UTC — mid-session scan
    - cron: '30 8 * * 1-5'
    # 5:00 PM IST = 11:30 UTC — EOD scan (all days)
    - cron: '30 11 * * *'
  workflow_dispatch:

env:
  TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
  UPSTOX_API_KEY:    ${{ secrets.UPSTOX_API_KEY }}
  UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python standalone_scan.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
