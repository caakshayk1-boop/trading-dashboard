name: SwingDesk Pro — Auto Scan

# IST = UTC+5:30
# 09:20 IST = 03:50 UTC  → morning: 4H + AI + commodities
# 11:45 IST = 06:15 UTC  → midday: swing + F&O + 4H + AI + commodities
# 16:30 IST = 11:00 UTC  → EOD: breakouts + swing + AI daily + commodities
# 09:30 IST SAT = 04:00 UTC  → Saturday: full + multibaggers
# 10:00–14:30 IST (every 30 min) → intraday momentum tier
on:
  schedule:
    - cron: '50 3 * * 1-5'       # 09:20 IST — morning (Mon-Fri)
    - cron: '15 6 * * 1-5'       # 11:45 IST — midday (Mon-Fri)
    - cron: '0 11 * * 1-5'       # 16:30 IST — EOD (Mon-Fri)
    - cron: '0 4 * * 6'          # 09:30 IST — Saturday full + multibaggers
    # Intraday 30-min tier: 10:00–14:30 IST = 04:30–09:00 UTC (Mon-Fri)
    - cron: '30 4 * * 1-5'       # 10:00 IST
    - cron: '0 5 * * 1-5'        # 10:30 IST
    - cron: '30 5 * * 1-5'       # 11:00 IST
    - cron: '0 6 * * 1-5'        # 11:30 IST
    - cron: '0 7 * * 1-5'        # 12:30 IST
    - cron: '30 7 * * 1-5'       # 13:00 IST
    - cron: '0 8 * * 1-5'        # 13:30 IST
    - cron: '30 8 * * 1-5'       # 14:00 IST
    - cron: '0 9 * * 1-5'        # 14:30 IST
  workflow_dispatch:              # manual trigger from GitHub UI

concurrency:
  group: scanner
  cancel-in-progress: false       # never cancel — queue next run

env:
  TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
  UPSTOX_API_KEY:      ${{ secrets.UPSTOX_API_KEY }}
  UPSTOX_API_SECRET:   ${{ secrets.UPSTOX_API_SECRET }}
  TURSO_URL:           ${{ secrets.TURSO_URL }}
  TURSO_TOKEN:         ${{ secrets.TURSO_TOKEN }}
  GH_PAT:              ${{ secrets.GH_PAT }}
  OBSIDIAN_GITHUB_REPO: ${{ secrets.OBSIDIAN_GITHUB_REPO }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.40" pandas numpy ta requests pytz requests-cache multitasking python-dotenv

      - name: Install DB + optional dependencies
        run: |
          pip install libsql-experimental || true   # required by tracker.py → db.py
          pip install groq feedparser apscheduler || true
          pip install upstox-python-sdk || true

      - name: Ensure data directory exists
        run: mkdir -p data logs cache

      - name: Detect scan slot
        id: slot
        run: |
          HOUR_UTC=$(date -u +%H)
          MIN_UTC=$(date -u +%M)
          # Intraday window: 04:30–09:00 UTC (10:00–14:30 IST), but not 03:50 morning or 06:15 midday
          # Morning: ~03:50 UTC | Midday: ~06:15 UTC | EOD: ~11:00 UTC
          if [ "$HOUR_UTC" = "03" ] && [ "$MIN_UTC" -ge 45 ]; then
            echo "type=standard" >> $GITHUB_OUTPUT
          elif [ "$HOUR_UTC" = "06" ] && [ "$MIN_UTC" -ge 10 ] && [ "$MIN_UTC" -le 20 ]; then
            echo "type=standard" >> $GITHUB_OUTPUT
          elif [ "$HOUR_UTC" = "11" ] && [ "$MIN_UTC" -le 5 ]; then
            echo "type=standard" >> $GITHUB_OUTPUT
          elif [ "$HOUR_UTC" = "04" ] && [ "$MIN_UTC" = "00" ]; then
            echo "type=standard" >> $GITHUB_OUTPUT  # Saturday
          else
            echo "type=intraday" >> $GITHUB_OUTPUT
          fi

      - name: Run standard scanner
        if: steps.slot.outputs.type == 'standard'
        run: python standalone_scan.py

      - name: Run intraday scanner
        if: steps.slot.outputs.type == 'intraday'
        run: python intraday_scan.py

      - name: Commit signal data to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git diff --staged --quiet || git commit -m "data: update signals $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push || echo "Push failed — likely no changes or conflict"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_id }}
          path: |
            logs/
            data/
          retention-days: 7
