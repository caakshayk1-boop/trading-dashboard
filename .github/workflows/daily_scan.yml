name: Nifty 500 Daily Scan

on:
  schedule:
    # 9:30 AM IST = 04:00 UTC — morning scan
    - cron: '0 4 * * 1-5'
    # 2:00 PM IST = 08:30 UTC — mid-session scan
    - cron: '30 8 * * 1-5'
    # 5:30 PM IST = 12:00 UTC — EOD scan
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
  UPSTOX_API_KEY:      ${{ secrets.UPSTOX_API_KEY }}
  UPSTOX_API_SECRET:   ${{ secrets.UPSTOX_API_SECRET }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python standalone_scan.py
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
