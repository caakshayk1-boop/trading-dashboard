name: Nifty 500 Daily Scan

on:
  schedule:
    # 9:30 AM IST = 04:00 UTC  (Mon-Fri)
    - cron: '0 4 * * 1-5'
    # 2:00 PM IST = 08:30 UTC  (Mon-Fri)
    - cron: '30 8 * * 1-5'
    # 5:30 PM IST = 12:00 UTC  (Mon-Sun, for FX/commodity future use)
    - cron: '0 12 * * *'
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python standalone_scan.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
