name: Global 200WMA Weekly Screener

# Every Monday 6:30 AM IST = Sunday 01:00 UTC
on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.40" pandas numpy requests

      - name: Run global 200WMA screener
        run: python global_200ma_screener.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/global_200ma.json || true
          git diff --staged --quiet || git commit -m "data: global 200WMA scan $(date -u '+%Y-%m-%d') [skip ci]"
          git push || true
